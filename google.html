<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Study Area Map</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
linear-gradient(
180deg,
#020617,
#111827,
#374151
);

font-family:'Segoe UI',sans-serif;

color:white;

}



.header h1{

font-size:42px;

color:white;

text-shadow:
0 0 20px rgba(56,189,248,.8);

}

.map-container{

width:95%;

margin:25px auto;

height:88vh;

background:#0f172a;

padding:18px;

border-radius:20px;

box-shadow:
0 0 25px rgba(56,189,248,.45);

}

iframe{

width:100%;

height:100%;

border:none;

border-radius:15px;

}

</style>

</head>

<body>


<div class="map-container">

<iframe src="https://www.google.com/maps/d/embed?mid=1d88AwgKuG_6UqpvQ9N1O76IXR9o11X4&ehbc=2E312F" width="640" height="480"></iframe>

</div>

</body>

</html>
